<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>契約者登録フォーム</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>
    
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type="date"], input[type="datetime-local"] { appearance: none; min-height: 3rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div class="min-h-screen py-10 px-4 sm:px-6 lg:px-8">
        <div class="max-w-3xl mx-auto">
            
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4">
                    <div class="bg-gradient-to-br from-yellow-400 to-orange-500 p-4 rounded-full shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    </div>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">契約者登録フォーム</h2>
            </div>

            <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
                
                <div id="success-view" class="hidden p-10 text-center fade-in">
                    <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100 mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-900 mb-2">登録完了！</h3>
                    <p class="text-slate-600 mb-8 max-w-md mx-auto">Kintoneへの登録とLINE通知が完了しました。</p>
                    <button onclick="location.reload()" class="w-full sm:w-auto inline-flex justify-center py-3 px-8 border border-transparent shadow-sm text-sm font-bold rounded-full text-white bg-blue-600 hover:bg-blue-700 transition-colors">続けて入力する</button>
                </div>

                <form id="contract-form" class="divide-y divide-slate-100" onsubmit="handleSubmit(event)">
                    
                    <!-- お客様情報 -->
                    <div class="p-6 sm:p-8 space-y-6">
                        <h3 class="text-lg font-bold text-slate-900 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-blue-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            お客様情報
                        </h3>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">契約種別 <span class="text-red-500">*</span></label>
                                <select id="contractType" required class="block w-full py-2 px-3 border border-slate-300 bg-white rounded-md shadow-sm h-12">
                                    <option value="自社【訪販】">自社【訪販】</option>
                                    <option value="自社【AEON】">自社【AEON】</option>
                                    <option value="自社【WEB】">自社【WEB】</option>
                                    <option value="自社【アライアンス】">自社【アライアンス】</option>
                                    <option value="FIT">FIT</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">契約日 <span class="text-red-500">*</span></label>
                                <input type="date" id="contractDate" required class="block w-full py-2 px-3 border border-slate-300 bg-white rounded-md shadow-sm h-12">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">契約者名（お客様名） <span class="text-red-500">*</span></label>
                                <input type="text" id="contractorName" required class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="例：山田 太郎">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">フリガナ <span class="text-red-500">*</span></label>
                                <input type="text" id="furigana" required class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="例：ヤマダ タロウ">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
                            <div class="sm:col-span-1">
                                <label class="block text-sm font-medium text-slate-700 mb-1">郵便番号</label>
                                <input type="text" id="postalCode" class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="123-4567">
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-sm font-medium text-slate-700 mb-1">設置場所住所 <span class="text-red-500">*</span></label>
                                <input type="text" id="address" required class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="例：東京都千代田区...">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">電話番号 <span class="text-red-500">*</span></label>
                                <input type="tel" id="phone" required class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="090-1234-5678">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
                                <input type="email" id="email" class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="example@email.com">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">売電先電力会社</label>
                                <select id="powerCompanyType" class="block w-full py-2 px-3 border border-slate-300 bg-white rounded-md shadow-sm h-12" onchange="togglePowerCompanyName()">
                                    <option value="">選択してください</option>
                                    <option value="東京電力">東京電力</option>
                                    <option value="新電力">新電力</option>
                                </select>
                            </div>
                            <div id="powerCompanyNameArea" class="hidden">
                                <label class="block text-sm font-medium text-slate-700 mb-1">電力会社名</label>
                                <input type="text" id="powerCompanyName" class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="例：ENEOSでんき">
                            </div>
                        </div>
                    </div>

                    <!-- 契約・商材情報 -->
                    <div class="p-6 sm:p-8 space-y-6 bg-slate-50">
                        <h3 class="text-lg font-bold text-slate-900 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-yellow-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            契約・商材情報
                        </h3>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">支払い方法 <span class="text-red-500">*</span></label>
                                <select id="paymentMethod" required class="block w-full py-2 px-3 border border-slate-300 bg-white rounded-md shadow-sm h-12" onchange="togglePaymentDetails()">
                                    <option value="">選択してください</option>
                                    <option value="一括(1回)">一括(1回)</option>
                                    <option value="一括(2回)">一括(2回)</option>
                                    <option value="信販">信販</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">契約金額 (税抜) <span class="text-red-500">*</span></label>
                                <input type="number" id="contractAmount" required class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border h-12" placeholder="2000000">
                            </div>
                        </div>

                        <div id="paymentDetailsArea" class="bg-blue-50 p-4 rounded-md border border-blue-200 hidden">
                            <div id="payment-single" class="hidden">
                                <label class="block text-sm font-medium text-blue-900 mb-1">入金予定日 <span class="text-red-500">*</span></label>
                                <input type="date" id="paymentDateSingle" class="block w-full border-blue-300 rounded-md shadow-sm h-12 px-3">
                            </div>
                            <div id="payment-double" class="hidden space-y-4">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-blue-900 mb-1">入金予定日(1回目) <span class="text-red-500">*</span></label>
                                        <input type="date" id="paymentDateDouble1" class="block w-full border-blue-300 rounded-md shadow-sm h-12 px-3">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-blue-900 mb-1">入金予定日(2回目) <span class="text-red-500">*</span></label>
                                        <input type="date" id="paymentDateDouble2" class="block w-full border-blue-300 rounded-md shadow-sm h-12 px-3">
                                    </div>
                                </div>
                            </div>
                            <div id="payment-credit" class="hidden">
                                <label class="block text-sm font-medium text-blue-900 mb-1">信販会社 <span class="text-red-500">*</span></label>
                                <select id="creditCompany" class="block w-full py-2 px-3 border border-blue-300 bg-white rounded-md shadow-sm h-12">
                                    <option value="">選択してください</option>
                                    <option value="アプラス">アプラス</option>
                                    <option value="プレミア">プレミア</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <span class="block text-sm font-medium text-slate-700 mb-2">商材情報（複数選択可） <span class="text-red-500">*</span></span>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                <label class="flex items-center p-3 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="products" value="solar" class="h-4 w-4 text-blue-600 rounded" onchange="toggleDetails()"> <span class="ml-3 text-sm">ソーラーパネル</span></label>
                                <label class="flex items-center p-3 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="products" value="battery" class="h-4 w-4 text-blue-600 rounded" onchange="toggleDetails()"> <span class="ml-3 text-sm">蓄電池</span></label>
                                <label class="flex items-center p-3 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="products" value="ecocute" class="h-4 w-4 text-blue-600 rounded" onchange="toggleDetails()"> <span class="ml-3 text-sm">エコキュート</span></label>
                                <label class="flex items-center p-3 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="products" value="v2h" class="h-4 w-4 text-blue-600 rounded" onchange="toggleDetails()"> <span class="ml-3 text-sm">V2H</span></label>
                                <label class="flex items-center p-3 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="products" value="ih" class="h-4 w-4 text-blue-600 rounded" onchange="toggleDetails()"> <span class="ml-3 text-sm">IH</span></label>
                            </div>
                        </div>

                        <div id="product-details-container" class="space-y-4 border-t border-slate-200 pt-4 mt-4">

                            <!-- ソーラーパネル詳細 -->
                            <div id="detail-solar" class="hidden bg-white p-4 rounded-md border border-yellow-200 shadow-sm fade-in">
                                <h4 class="font-bold text-yellow-700 mb-3">☀️ ソーラーパネル詳細</h4>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div><label class="text-xs text-slate-500">メーカー名</label><input type="text" id="solarManufacturer" class="w-full border p-2 rounded" placeholder="例：Qセルズ"></div>
                                    <div><label class="text-xs text-slate-500">システム容量 (kW)</label><input type="number" step="0.0001" id="solarCapacity" class="w-full border p-2 rounded" placeholder="例：5.5"></div>
                                </div>
                            </div>

                            <!-- 蓄電池詳細（メーカー→型番→容量の順） -->
                            <div id="detail-battery" class="hidden bg-white p-4 rounded-md border border-green-200 shadow-sm fade-in">
                                <h4 class="font-bold text-green-700 mb-3">🔋 蓄電池詳細</h4>
                                <div class="grid grid-cols-1 gap-4">
                                    <!-- ① メーカー選択 -->
                                    <div>
                                        <label class="text-xs text-slate-500">メーカー名</label>
                                        <select id="batteryManufacturer" class="w-full border p-2 rounded h-10" onchange="updateBatteryModels()">
                                            <option value="">選択してください</option>
                                            <option value="DMM">DMM</option>
                                            <option value="XSOL">XSOL</option>
                                            <option value="SHARP">SHARP</option>
                                            <option value="ニチコン">ニチコン</option>
                                            <option value="住友電工">住友電工</option>
                                            <option value="長州産業">長州産業</option>
                                            <option value="リブタワー">リブタワー</option>
                                            <option value="その他">その他</option>
                                        </select>
                                    </div>
                                    <!-- その他メーカー入力 -->
                                    <div id="batteryManufacturerOtherArea" class="hidden">
                                        <label class="text-xs text-slate-500">メーカー名（その他）</label>
                                        <input type="text" id="batteryManufacturerOther" class="w-full border p-2 rounded" placeholder="メーカー名を入力してください">
                                    </div>
                                    <!-- ② 型番プルダウン（メーカー選択後に表示） -->
                                    <div id="batteryModelArea" class="hidden">
                                        <label class="text-xs text-slate-500">型番</label>
                                        <select id="batteryModel" class="w-full border p-2 rounded h-10">
                                            <option value="">選択してください</option>
                                        </select>
                                    </div>
                                    <!-- その他型番入力 -->
                                    <div id="batteryModelOtherArea" class="hidden">
                                        <label class="text-xs text-slate-500">型番（その他）</label>
                                        <input type="text" id="batteryModelOther" class="w-full border p-2 rounded" placeholder="型番を入力してください">
                                    </div>
                                    <!-- ③ 蓄電容量 -->
                                    <div>
                                        <label class="text-xs text-slate-500">蓄電容量 (kWh)</label>
                                        <input type="number" step="0.01" id="batteryCapacity" class="w-full border p-2 rounded" placeholder="例：9.8">
                                    </div>
                                </div>
                            </div>

                            <!-- エコキュート詳細（メーカー→型番→容量の順） -->
                            <div id="detail-ecocute" class="hidden bg-white p-4 rounded-md border border-blue-200 shadow-sm fade-in">
                                <h4 class="font-bold text-blue-700 mb-3">💧 エコキュート詳細</h4>
                                <div class="grid grid-cols-1 gap-4">
                                    <!-- ① メーカー選択 -->
                                    <div>
                                        <label class="text-xs text-slate-500">メーカー名</label>
                                        <select id="ecoCuteManufacturer" class="w-full border p-2 rounded h-10" onchange="updateEcoCuteModels()">
                                            <option value="">選択してください</option>
                                            <option value="コロナ">コロナ</option>
                                            <option value="その他">その他</option>
                                        </select>
                                    </div>
                                    <!-- その他メーカー入力 -->
                                    <div id="ecoCuteManufacturerOtherArea" class="hidden">
                                        <label class="text-xs text-slate-500">メーカー名（その他）</label>
                                        <input type="text" id="ecoCuteManufacturerOther" class="w-full border p-2 rounded" placeholder="メーカー名を入力してください">
                                    </div>
                                    <!-- ② 型番プルダウン（メーカー選択後に表示） -->
                                    <div id="ecoCuteModelArea" class="hidden">
                                        <label class="text-xs text-slate-500">型番</label>
                                        <select id="ecoCuteModel" class="w-full border p-2 rounded h-10">
                                            <option value="">選択してください</option>
                                        </select>
                                    </div>
                                    <!-- その他型番入力 -->
                                    <div id="ecoCuteModelOtherArea" class="hidden">
                                        <label class="text-xs text-slate-500">型番（その他）</label>
                                        <input type="text" id="ecoCuteModelOther" class="w-full border p-2 rounded" placeholder="型番を入力してください">
                                    </div>
                                    <!-- ③ タンク容量 -->
                                    <div>
                                        <label class="text-xs text-slate-500">タンク容量 (L)</label>
                                        <input type="number" id="ecoCuteCapacity" class="w-full border p-2 rounded" placeholder="例：370">
                                    </div>
                                </div>
                            </div>

                            <!-- V2H詳細 -->
                            <div id="detail-v2h" class="hidden bg-white p-4 rounded-md border border-indigo-200 shadow-sm fade-in">
                                <h4 class="font-bold text-indigo-700 mb-3">🚗 V2H詳細</h4>
                                <div><label class="text-xs text-slate-500">メーカー名</label><input type="text" id="v2hManufacturer" class="w-full border p-2 rounded" placeholder="例：ニチコン"></div>
                            </div>

                            <!-- IH詳細 -->
                            <div id="detail-ih" class="hidden bg-white p-4 rounded-md border border-red-200 shadow-sm fade-in">
                                <h4 class="font-bold text-red-700 mb-3">🍳 IH詳細</h4>
                                <div><label class="text-xs text-slate-500">メーカー名</label><input type="text" id="ihManufacturer" class="w-full border p-2 rounded" placeholder="例：パナソニック"></div>
                            </div>
                        </div>

                        <!-- 補助金情報 -->
                        <div class="mt-4 border-t border-slate-200 pt-4">
                            <span class="block text-sm font-medium text-slate-700 mb-2">補助金情報（複数選択可）</span>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                <label class="flex items-center p-2 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="subsidies" value="東京都太陽光補助金" class="h-4 w-4 text-orange-600 rounded"><span class="ml-3 text-sm">東京都太陽光補助金</span></label>
                                <label class="flex items-center p-2 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="subsidies" value="東京都蓄電池補助金" class="h-4 w-4 text-orange-600 rounded"><span class="ml-3 text-sm">東京都蓄電池補助金</span></label>
                                <label class="flex items-center p-2 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="subsidies" value="東京都エコキュート補助金" class="h-4 w-4 text-orange-600 rounded"><span class="ml-3 text-sm">東京都エコキュート補助金</span></label>
                                <label class="flex items-center p-2 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" name="subsidies" value="給湯省エネ補助金" class="h-4 w-4 text-orange-600 rounded"><span class="ml-3 text-sm">給湯省エネ補助金</span></label>
                                <label class="flex items-center p-2 rounded-lg border border-slate-300 bg-white cursor-pointer hover:bg-slate-50 transition-colors"><input type="checkbox" id="municipalSubsidyCheck" name="subsidies" value="市区町村補助金" class="h-4 w-4 text-orange-600 rounded" onchange="toggleMunicipalSubsidy()"><span class="ml-3 text-sm">市区町村補助金</span></label>
                            </div>
                            <div id="municipalSubsidyArea" class="hidden mt-2">
                                <label class="block text-sm font-medium text-slate-700 mb-1">市区町村補助金エリア（対象地域を記入）</label>
                                <input type="text" id="municipalSubsidyAreaText" class="block w-full border-slate-300 rounded-md shadow-sm py-2 px-3 border" placeholder="例：東京都世田谷区、神奈川県川崎市 等">
                            </div>
                        </div>
                    </div>

                    <!-- 担当・施工情報 -->
                    <div class="p-6 sm:p-8 space-y-6">
                        <h3 class="text-lg font-bold text-slate-900 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-indigo-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                            担当・施工情報
                        </h3>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">AP担当者名 <span class="text-red-500">*</span></label>
                                <input type="text" id="apStaffName" required class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="アポインター名">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">CL担当者名 <span class="text-red-500">*</span></label>
                                <input type="text" id="clStaffName" required class="block w-full border-slate-300 rounded-md shadow-sm py-3 px-3 border" placeholder="クローザー名">
                            </div>
                        </div>

                        <div class="border-t border-slate-200 my-4"></div>

                        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 flex items-center mb-1">現調日 (日時)</label>
                                <input type="datetime-local" id="surveyDate" class="block w-full border-slate-300 rounded-md shadow-sm border py-2 px-3 h-12">
                            </div>
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <label class="block text-sm font-medium text-slate-700">施工日</label>
                                    <div class="flex items-center pb-0.5">
                                        <input type="checkbox" id="isConstructionUndecided" class="h-4 w-4 text-indigo-600 rounded" onchange="toggleConstructionDate()">
                                        <label for="isConstructionUndecided" class="ml-2 block text-xs text-slate-500 cursor-pointer whitespace-nowrap">未定の場合はチェック</label>
                                    </div>
                                </div>
                                <input type="date" id="constructionDate" class="block w-full border-slate-300 rounded-md shadow-sm border py-2 px-3 h-12">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">担当施工店</label>
                            <select id="constructionShop" class="block w-full py-2 px-3 border border-slate-300 bg-white rounded-md shadow-sm h-12">
                                <option value="">選択してください</option>
                                <option value="APC">APC</option>
                                <option value="テクノホーム">テクノホーム</option>
                                <option value="TERRA">TERRA</option>
                                <option value="その他">その他(※備考欄に記述)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">備考・特記事項</label>
                            <div class="mt-1">
                                <textarea id="notes" rows="4" class="shadow-sm block w-full sm:text-sm border border-slate-300 rounded-md p-3" placeholder="その他連絡事項があれば入力してください"></textarea>
                            </div>
                        </div>
                    </div>

                    <div id="error-message" class="hidden p-4 bg-red-50">
                        <div class="flex">
                            <div class="flex-shrink-0"><svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" /></svg></div>
                            <div class="ml-3"><h3 class="text-sm font-medium text-red-800">エラーが発生しました</h3><div id="error-text" class="mt-2 text-sm text-red-700"></div></div>
                        </div>
                    </div>

                    <div class="px-6 py-8 bg-slate-50 sm:px-10 flex justify-end rounded-b-2xl">
                        <button type="submit" id="submit-btn" class="w-full sm:w-auto inline-flex justify-center items-center py-4 px-12 border border-transparent shadow-lg text-lg font-bold rounded-full text-white bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all transform hover:scale-105 active:scale-95">
                            <span id="btn-text">契約を確定・報告する</span>
                            <div id="btn-loading" class="hidden spinner ml-2"></div>
                        </button>
                    </div>

                </form>
            </div>
            
            <div class="mt-8 text-center"><p class="text-xs text-slate-400 font-medium">営業管理システム © 2026 Solar Sales Co.</p></div>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzIbrY99Xx0p09xsl91MXi1OshxgcKAY1kza8dUr3uJzzJuk7udlJQXC-xbNJ6VHVh30g/exec";

        // =========================================================
        // ★ 蓄電池・エコキュート 型番マスター
        // =========================================================
        const BATTERY_MODELS = {
            'DMM':    ['4.95-5N-DM','4.95-10N-DM','4.95-15N-DM','4.95-7N-DM','4.95-14N-DM','4.95-21N-DM'],
            'XSOL':   ['4.95-5-N-XSOL','4.95-10-N-XSOL','4.95-15-N-XSOL','4.95-7-N-XSOL','4.95-14-N-XSOL','4.95-21-N-XSOL'],
            'SHARP':  ['JH-WBPDD988','JH-WBPDC988','JH-WBPDD880','JH-WBPDC880','JH-WBPDB777','JH-WBPDA777'],
            'ニチコン': ['ES-T5','ES-T6'],
            '住友電工': ['PDH-6000S01A'],
            '長州産業': ['CB-P63M06A','CB-P98M06A','CB-P127M06A','CB-P164M06A'],
            'リブタワー': ['ESS-T5MGCK','ESS-T6MGCK','ESS-T5XGCK','ESS-T6XGCK'],
        };

        const ECOCUTE_MODELS = {
            'コロナ': ['CHP-E37AZ2','CHP-E46AZ2','CHP-ES46AZ2','CHP-37AZ2','CHP-46AZ2'],
        };

        // 蓄電池：メーカー変更時に型番プルダウンを更新
        function updateBatteryModels() {
            const maker = document.getElementById('batteryManufacturer').value;
            const modelArea = document.getElementById('batteryModelArea');
            const modelSelect = document.getElementById('batteryModel');
            const otherMakerArea = document.getElementById('batteryManufacturerOtherArea');
            const otherModelArea = document.getElementById('batteryModelOtherArea');

            // リセット
            modelSelect.innerHTML = '<option value="">選択してください</option>';
            modelArea.classList.add('hidden');
            otherMakerArea.classList.add('hidden');
            otherModelArea.classList.add('hidden');

            if (maker === 'その他') {
                otherMakerArea.classList.remove('hidden');
                otherModelArea.classList.remove('hidden');
            } else if (maker && BATTERY_MODELS[maker]) {
                BATTERY_MODELS[maker].forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
                modelArea.classList.remove('hidden');
            }
        }

        // エコキュート：メーカー変更時に型番プルダウンを更新
        function updateEcoCuteModels() {
            const maker = document.getElementById('ecoCuteManufacturer').value;
            const modelArea = document.getElementById('ecoCuteModelArea');
            const modelSelect = document.getElementById('ecoCuteModel');
            const otherMakerArea = document.getElementById('ecoCuteManufacturerOtherArea');
            const otherModelArea = document.getElementById('ecoCuteModelOtherArea');

            // リセット
            modelSelect.innerHTML = '<option value="">選択してください</option>';
            modelArea.classList.add('hidden');
            otherMakerArea.classList.add('hidden');
            otherModelArea.classList.add('hidden');

            if (maker === 'その他') {
                otherMakerArea.classList.remove('hidden');
                otherModelArea.classList.remove('hidden');
            } else if (maker && ECOCUTE_MODELS[maker]) {
                ECOCUTE_MODELS[maker].forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
                modelArea.classList.remove('hidden');
            }
        }

        // =========================================================
        // 既存の関数
        // =========================================================
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('contractDate').value = today;
        };

        function toggleMunicipalSubsidy() {
            const checked = document.getElementById('municipalSubsidyCheck').checked;
            const area = document.getElementById('municipalSubsidyArea');
            checked ? area.classList.remove('hidden') : area.classList.add('hidden');
            if (!checked) document.getElementById('municipalSubsidyAreaText').value = '';
        }

        function togglePowerCompanyName() {
            const type = document.getElementById('powerCompanyType').value;
            const nameArea = document.getElementById('powerCompanyNameArea');
            if (type === '新電力') {
                nameArea.classList.remove('hidden');
            } else {
                nameArea.classList.add('hidden');
                document.getElementById('powerCompanyName').value = '';
            }
        }

        function toggleDetails() {
            document.querySelectorAll('input[name="products"]').forEach(cb => {
                const detailEl = document.getElementById('detail-' + cb.value);
                if (detailEl) cb.checked ? detailEl.classList.remove('hidden') : detailEl.classList.add('hidden');
            });
        }

        function toggleConstructionDate() {
            const checkbox = document.getElementById('isConstructionUndecided');
            const input = document.getElementById('constructionDate');
            input.disabled = checkbox.checked;
            if (checkbox.checked) {
                input.classList.add('bg-slate-100', 'cursor-not-allowed');
                input.value = '';
            } else {
                input.classList.remove('bg-slate-100', 'cursor-not-allowed');
            }
        }

        function togglePaymentDetails() {
            const method = document.getElementById('paymentMethod').value;
            const container = document.getElementById('paymentDetailsArea');
            const single = document.getElementById('payment-single');
            const double = document.getElementById('payment-double');
            const credit = document.getElementById('payment-credit');

            container.classList.add('hidden');
            single.classList.add('hidden');
            double.classList.add('hidden');
            credit.classList.add('hidden');

            if (method === '一括(1回)') {
                container.classList.remove('hidden'); single.classList.remove('hidden');
            } else if (method === '一括(2回)') {
                container.classList.remove('hidden'); double.classList.remove('hidden');
            } else if (method === '信販') {
                container.classList.remove('hidden'); credit.classList.remove('hidden');
            }
        }

        // =========================================================
        // フォーム送信
        // =========================================================
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const btnLoading = document.getElementById('btn-loading');
            const btnText = document.getElementById('btn-text');
            const errorMessageDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("ここにGAS")) {
                alert("GASのURLを設定してください。");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            btnText.textContent = "送信中...";
            btnLoading.classList.remove('hidden');
            errorMessageDiv.classList.add('hidden');

            try {
                const selectedProducts = [];
                document.querySelectorAll('input[name="products"]:checked').forEach(cb => selectedProducts.push(cb.value));

                const selectedSubsidies = [];
                document.querySelectorAll('input[name="subsidies"]:checked').forEach(cb => selectedSubsidies.push(cb.value));

                const paymentMethod = document.getElementById('paymentMethod').value;
                let paymentDate1 = '', paymentDate2 = '', creditCompany = '';
                if (paymentMethod === '一括(1回)') {
                    paymentDate1 = document.getElementById('paymentDateSingle').value;
                } else if (paymentMethod === '一括(2回)') {
                    paymentDate1 = document.getElementById('paymentDateDouble1').value;
                    paymentDate2 = document.getElementById('paymentDateDouble2').value;
                } else if (paymentMethod === '信販') {
                    creditCompany = document.getElementById('creditCompany').value;
                }

                // ★ 蓄電池：メーカー・型番の取得（その他対応）
                const batteryMakerSelected = document.getElementById('batteryManufacturer').value;
                const batteryManufacturer = batteryMakerSelected === 'その他'
                    ? document.getElementById('batteryManufacturerOther').value
                    : batteryMakerSelected;
                const batteryModel = batteryMakerSelected === 'その他'
                    ? document.getElementById('batteryModelOther').value
                    : document.getElementById('batteryModel').value;

                // ★ エコキュート：メーカー・型番の取得（その他対応）
                const ecoCuteMakerSelected = document.getElementById('ecoCuteManufacturer').value;
                const ecoCuteManufacturer = ecoCuteMakerSelected === 'その他'
                    ? document.getElementById('ecoCuteManufacturerOther').value
                    : ecoCuteMakerSelected;
                const ecoCuteModel = ecoCuteMakerSelected === 'その他'
                    ? document.getElementById('ecoCuteModelOther').value
                    : document.getElementById('ecoCuteModel').value;

                // バリデーション
                const validationErrors = [];
                if (selectedProducts.length === 0) validationErrors.push('「商材情報」を1つ以上選択してください。');
                if (paymentMethod === '一括(1回)' && !paymentDate1) validationErrors.push('「入金予定日」を入力してください。');
                if (paymentMethod === '一括(2回)') {
                    if (!paymentDate1) validationErrors.push('「入金予定日(1回目)」を入力してください。');
                    if (!paymentDate2) validationErrors.push('「入金予定日(2回目)」を入力してください。');
                }
                if (paymentMethod === '信販' && !creditCompany) validationErrors.push('「信販会社」を選択してください。');
                if (document.getElementById('powerCompanyType').value === '新電力' && !document.getElementById('powerCompanyName').value.trim()) {
                    validationErrors.push('売電先が「新電力」の場合、「電力会社名」を入力してください。');
                }

                if (validationErrors.length > 0) {
                    errorText.innerHTML = validationErrors.map(e => `・${e}`).join('<br>');
                    errorMessageDiv.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                    btnText.textContent = "契約を確定・報告する";
                    btnLoading.classList.add('hidden');
                    errorMessageDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }

                const data = {
                    contractType: document.getElementById('contractType').value,
                    contractDate: document.getElementById('contractDate').value,
                    contractorName: document.getElementById('contractorName').value,
                    furigana: document.getElementById('furigana').value,
                    postalCode: document.getElementById('postalCode').value,
                    address: document.getElementById('address').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value,
                    powerPurchaser: document.getElementById('powerCompanyType').value,
                    powerCompanyName: document.getElementById('powerCompanyName').value,
                    paymentMethod,
                    paymentDate1,
                    paymentDate2,
                    creditCompany,
                    contractAmount: document.getElementById('contractAmount').value,
                    selectedProducts,
                    subsidies: selectedSubsidies,
                    solarManufacturer: document.getElementById('solarManufacturer').value,
                    solarCapacity: document.getElementById('solarCapacity').value,
                    // ★ 蓄電池（型番追加）
                    batteryManufacturer,
                    batteryModel,
                    batteryCapacity: document.getElementById('batteryCapacity').value,
                    // ★ エコキュート（型番追加）
                    ecoCuteManufacturer,
                    ecoCuteModel,
                    ecoCuteCapacity: document.getElementById('ecoCuteCapacity').value,
                    v2hManufacturer: document.getElementById('v2hManufacturer').value,
                    ihManufacturer: document.getElementById('ihManufacturer').value,
                    apStaffName: document.getElementById('apStaffName').value,
                    clStaffName: document.getElementById('clStaffName').value,
                    surveyDate: document.getElementById('surveyDate').value,
                    constructionDate: document.getElementById('constructionDate').value,
                    isConstructionUndecided: document.getElementById('isConstructionUndecided').checked,
                    constructionShop: document.getElementById('constructionShop').value,
                    notes: document.getElementById('notes').value,
                    municipalSubsidyAreaText: document.getElementById('municipalSubsidyAreaText').value
                };

                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(data),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });

                const result = await response.json();
                if (result.status === 'error') throw new Error(result.message);
                if (result.logs && result.logs.length > 0) throw new Error(result.logs.join('\n'));

                document.getElementById('contract-form').classList.add('hidden');
                document.getElementById('success-view').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                errorText.textContent = '送信エラー: ' + error.message;
                errorMessageDiv.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                btnText.textContent = "契約を確定・報告する";
                btnLoading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
